      <stop offset=".45" stop-color="#1f82ff"/>
      <stop offset="1" stop-color="#b13cff"/>
    </linearGradient>
    <linearGradient id="orbit" x1="76" y1="284" x2="444" y2="228" gradientUnits="userSpaceOnUse">
