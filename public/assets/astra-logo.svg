<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Astra_AI logo</title>
  <desc id="desc">A luminous A with an orbital ring and star points.</desc>
  <defs>
    <linearGradient id="astraA" x1="126" y1="86" x2="382" y2="424" gradientUnits="userSpaceOnUse">
